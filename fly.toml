# fly.toml - For India deployment (Singapore region)

app = "tabpurge-analytics"

primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = 256
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "tabpurge_data"
  destination = "/data"

[experimental]
  auto_rollback = true